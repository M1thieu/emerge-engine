name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: test (no features — CPU-only path)
        run: cargo test
      # gpu/render tests need a Vulkan adapter. ubuntu-latest has no GPU and no software
      # Vulkan driver by default — without lavapipe, every GPU test panics on
      # request_adapter().expect(...). windows-latest gets D3D12 WARP from the OS itself,
      # no extra install needed.
      - name: install software Vulkan driver (lavapipe)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y mesa-vulkan-drivers
      # -j 2: cargo test --all-features builds every integration test binary against
      # gpu+render+experimental at once; full parallelism can exhaust available memory
      # and crash the linker (STATUS_STACK_BUFFER_OVERRUN, confirmed reproducible and
      # confirmed fixed by capping parallelism -- not a code bug, see CONTRIBUTING.md).
      - name: test (all features)
        run: cargo test --all-features -j 2

  publish-dry-run:
    name: publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --dry-run
